<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập — IUOSS Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 400px; }
    .login-logo { font-size: 2rem; font-weight: 800; color: #1d4ed8; letter-spacing: -.02em; }
    .login-sub  { color: #64748b; font-size: .875rem; }
  </style>
</head>
<body>
  <div class="login-card px-3">
    <div class="text-center mb-4">
      <div class="login-logo">IUOSS Hub</div>
      <div class="login-sub">Cổng thông tin sinh viên</div>
    </div>

    <div class="card shadow-sm border-0 rounded-3">
      <div class="card-body p-4">
        <h5 class="card-title fw-bold mb-1">Đăng nhập</h5>
        <p class="text-muted small mb-4">Sử dụng tài khoản mạng nội bộ trường (MSSV / mật khẩu IU)</p>

        {% if messages %}
          {% for msg in messages %}
            <div class="alert alert-danger py-2 small">{{ msg }}</div>
          {% endfor %}
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}">

          <div class="mb-3">
            <label class="form-label small fw-semibold" for="uid">Tài khoản (MSSV)</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="uid" name="uid"
                     value="{{ uid|default:'' }}" placeholder="VD: BABAWE21603"
                     autocomplete="username" autofocus required>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label small fw-semibold" for="password">Mật khẩu</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="Mật khẩu mạng IU" autocomplete="current-password" required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
          </button>
        </form>
      </div>
    </div>

    <p class="text-center text-muted small mt-3">
      Dùng cùng tài khoản đăng nhập website <a href="https://iuoss.com" target="_blank">iuoss.com</a>
    </p>
  </div>
</body>
</html>
